name: Bug Report
description: Create a bug report to help us improve OpenAcre
labels: ["bug"]
body:
    - type: markdown
      attributes:
          value: |
              ## Before you start
              Please **make sure you are on the latest version of OpenAcre.**
              If you encountered the issue after you installed, updated, or reloaded the project, **please try restarting Godot before reporting the bug**.

    - type: checkboxes
      id: no-duplicate-issues
      attributes:
          label: "Please check that this issue hasn't been reported before."
          description: "The **Label filters** may help make your search more focussed."
          options:
              - label: "I searched previous [Bug Reports](https://github.com/OpenAcre-Project/OpenAcre/issues?q=is%3Aissue+is%3Aopen+label%3Abug) and didn't find any similar reports."
                required: true

    - type: textarea
      id: expected
      attributes:
          label: Expected Behavior
          description: Tell us what **should** happen.
      validations:
          required: true

    - type: textarea
      id: what-happened
      attributes:
          label: Current behaviour
          description: |
              Tell us what happens instead of the expected behavior.
              Adding screenshots or recordings really helps.
      validations:
          required: true

    - type: textarea
      id: console
      attributes:
          label: Godot Console/Output
          description: |
              Please copy/paste any errors or warnings from the Godot editor's "Output" or "Debugger" tab.

    - type: textarea
      id: reproduce
      attributes:
          label: Steps to reproduce
          description: |
              Which exact steps can a developer take to reproduce the issue? The more detail you provide, the easier it will be to narrow down and fix the bug.
      validations:
          required: true

    - type: checkboxes
      id: operating-systems
      attributes:
          label: Which Operating Systems are you using?
          description: You may select more than one.
          options:
              - label: Windows
              - label: Linux
              - label: macOS

    - type: input
      id: godot-version
      attributes:
          label: Godot Version
          description: Which Godot version are you using? (e.g., Godot 4.3.stable)
          placeholder: "Enter Godot Version here."
      validations:
          required: true

    - type: input
      id: openacre-version
      attributes:
          label: OpenAcre Version/Commit
          description: Which version or commit hash of OpenAcre are you using?
          placeholder: "Enter version or commit hash here."
      validations:
          required: true

    - type: textarea
      id: possible-solution
      attributes:
          label: Possible solution
          description: |
              Not obligatory, but please suggest a fix or reason for the bug, if you have an idea.

    - type: textarea
      id: comments
      attributes:
          label: Comments
          description: Anything you'd like to share that didn't fit into an above box.
