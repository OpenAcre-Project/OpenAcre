image: python:3.10

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

pages:
  stage: deploy
  script:
    - pip install mkdocs-material
    - mkdocs build --site-dir public
    # Push the built site to the gl-docs branch, which makes it available for reference/pages config there
    - git config user.name "GitLab CI"
    - git config user.email "gitlab-ci@example.com"
    - mkdocs gh-deploy --force --remote-branch gl-docs || echo "gh-deploy failed, relying on pages artifact"
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
